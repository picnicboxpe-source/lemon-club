<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lemon Club Pro</title>
<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:black; color:white; padding:15px; text-align:center; }
nav { display:flex; justify-content:space-around; background:white; padding:10px; }
nav button { background:none; border:none; font-weight:bold; }
.container { padding:15px; }
.hidden { display:none; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
input, select, button { padding:10px; margin:5px 0; width:100%; }
</style>
</head>
<body>

<header>🍋 Lemon Club</header>

<div id="login" class="container">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Clave">
    <button onclick="login()">Ingresar</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<div id="app" class="hidden">
  <nav>
    <button onclick="show('ventas')">Ventas</button>
    <button onclick="show('inventario')">Inventario</button>
    <button onclick="show('finanzas')">Finanzas</button>
    <button onclick="show('balance')">Balance</button>
    <button onclick="show('historial')">Historial</button>
  </nav>

  <div class="container">

    <!-- INVENTARIO -->
    <div id="inventario" class="section">
      <div class="card">
        <h3>Inventario</h3>
        <input id="prod" placeholder="Producto">
        <input id="stock" type="number" placeholder="Cantidad">
        <button onclick="addInv()">Agregar</button>
      </div>
      <div id="listaInv"></div>
    </div>

    <!-- VENTAS -->
    <div id="ventas" class="section hidden">
      <div class="card">
        <h3>Nueva venta</h3>
        <input id="cliente" placeholder="Cliente">
        <input id="ciudad" placeholder="Ciudad">
        <input id="ventaProd" placeholder="Producto">
        <input id="ventaCant" type="number" placeholder="Cantidad">
        <input id="precio" type="number" placeholder="Precio (S/)">
        <select id="tipo">
          <option value="delivery">Delivery</option>
          <option value="pickup">Pickup</option>
        </select>
        <input id="fecha" type="date">
        <button onclick="venta()">Registrar venta</button>
      </div>
      <div id="listaVentas"></div>
    </div>

    <!-- FINANZAS -->
    <div id="finanzas" class="section hidden">
      <div class="card">
        <h3>Registrar gasto</h3>
        <input id="gastoDesc" placeholder="Descripción">
        <input id="gastoMonto" type="number" placeholder="Monto">
        <button onclick="addGasto()">Agregar gasto</button>
      </div>
      <div class="card">
        <h3>Resumen</h3>
        <p id="ingresos"></p>
        <p id="gastos"></p>
        <p id="neto"></p>
      </div>
    </div>

    <!-- BALANCE -->
    <div id="balance" class="section hidden">
      <div class="card">
        <h3>Balance total</h3>
        <p id="balanceText"></p>
      </div>
    </div>

    <!-- HISTORIAL -->
    <div id="historial" class="section hidden">
      <div id="hist"></div>
    </div>

  </div>
</div>

<script>
const CLAVE = "1234";

let inventario = JSON.parse(localStorage.getItem("inv")||"[]");
let ventas = JSON.parse(localStorage.getItem("ventas")||"[]");
let gastos = JSON.parse(localStorage.getItem("gastos")||"[]");

function login(){
  if(pass.value===CLAVE){
    login.classList.add("hidden");
    app.classList.remove("hidden");
    render();
  } else error.innerText="Clave incorrecta";
}

function show(sec){
  document.querySelectorAll(".section").forEach(s=>s.classList.add("hidden"));
  document.getElementById(sec).classList.remove("hidden");
}

function addInv(){
  inventario.push({nombre:prod.value, stock:parseInt(stock.value)});
  localStorage.setItem("inv", JSON.stringify(inventario));
  prod.value=""; stock.value="";
  render();
}

function venta(){
  let item = inventario.find(i=>i.nombre===ventaProd.value);
  let c = parseInt(ventaCant.value);

  if(!item || item.stock < c){ alert("Sin stock"); return; }

  item.stock -= c;

  ventas.push({
    cliente: cliente.value,
    ciudad: ciudad.value,
    producto: ventaProd.value,
    cantidad: c,
    precio: parseFloat(precio.value),
    tipo: tipo.value,
    fecha: fecha.value
  });

  localStorage.setItem("inv", JSON.stringify(inventario));
  localStorage.setItem("ventas", JSON.stringify(ventas));

  render();
}

function addGasto(){
  gastos.push({
    desc: gastoDesc.value,
    monto: parseFloat(gastoMonto.value)
  });
  localStorage.setItem("gastos", JSON.stringify(gastos));
  render();
}

function render(){
  listaInv.innerHTML="";
  inventario.forEach(i=>{
    listaInv.innerHTML += `<div class='card'>${i.nombre} - ${i.stock}</div>`;
  });

  listaVentas.innerHTML="";
  ventas.forEach(v=>{
    listaVentas.innerHTML += `<div class='card'>
      ${v.cliente} - ${v.producto} (${v.cantidad})<br>
      ${v.tipo} - ${v.fecha}
    </div>`;
  });

  let totalIng = ventas.reduce((a,b)=>a + (b.precio*b.cantidad),0);
  let totalGas = gastos.reduce((a,b)=>a + b.monto,0);
  let neto = totalIng - totalGas;

  ingresos.innerText="Ingresos: S/ "+totalIng;
  gastosText = document.getElementById("gastos");
  gastosText.innerText="Gastos: S/ "+totalGas;
  netoText = document.getElementById("neto");
  netoText.innerText="Neto: S/ "+neto;

  balanceText.innerText="Balance total: S/ "+neto;

  hist.innerHTML="";
  ventas.forEach(v=>{
    hist.innerHTML += `<div class='card'>${v.cliente} - ${v.producto}</div>`;
  });
}
</script>

</body>
</html>
