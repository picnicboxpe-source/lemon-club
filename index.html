<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lemon App Simple</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.container { max-width:400px; margin:60px auto; background:white; padding:20px; border-radius:10px; }
input, button { width:100%; padding:10px; margin:5px 0; }
.hidden { display:none; }
.item { padding:8px; border-bottom:1px solid #ddd; }
</style>
</head>
<body>

<div id="login" class="container">
<h2>Login</h2>
<input id="user" placeholder="Usuario">
<input id="pass" placeholder="Clave" type="password">
<button onclick="login()">Ingresar</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" class="container hidden">
<h2>Inventario</h2>
<input id="producto" placeholder="Producto">
<input id="cantidad" placeholder="Cantidad" type="number">
<button onclick="agregar()">Agregar</button>

<h3>Lista</h3>
<div id="lista"></div>

<button onclick="logout()">Cerrar sesión</button>
</div>

<script>
const CLAVE = "1234"; // clave compartida simple
let inventario = JSON.parse(localStorage.getItem("inv") || "[]");

function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (!user || !pass) {
    document.getElementById("error").innerText = "Completa todos los campos";
    return;
  }

  if (pass === CLAVE) {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    render();
  } else {
    document.getElementById("error").innerText = "Clave incorrecta";
  }
}

function logout() {
  location.reload();
}

function agregar() {
  const producto = document.getElementById("producto").value;
  const cantidad = parseInt(document.getElementById("cantidad").value);

  if (!producto || !cantidad) return;

  inventario.push({ producto, cantidad });
  localStorage.setItem("inv", JSON.stringify(inventario));

  document.getElementById("producto").value = "";
  document.getElementById("cantidad").value = "";

  render();
}

function eliminar(index) {
  inventario.splice(index, 1);
  localStorage.setItem("inv", JSON.stringify(inventario));
  render();
}

function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  inventario.forEach((item, i) => {
    lista.innerHTML += `
      <div class="item">
        ${item.producto} - ${item.cantidad}
        <button onclick="eliminar(${i})">Eliminar</button>
      </div>
    `;
  });
}
</script>

</body>
</html>
